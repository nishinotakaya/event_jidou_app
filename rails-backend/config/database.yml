default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: mysql2
  host: <%= ENV.fetch("MYSQL_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("MYSQL_PORT_ON_HOST", 3009) %>
  database: <%= ENV.fetch("MYSQL_DATABASE", "myapp_development") %>
  username: root
  password: <%= ENV.fetch("MYSQL_ROOT_PASSWORD", "password") %>
  encoding: utf8mb4

test:
  <<: *default
  adapter: sqlite3
  database: storage/test.sqlite3
  timeout: 5000

# Production uses JAWSDB_URL (Heroku JawsDB MySQL)
# JawsDB sets JAWSDB_URL with mysql:// scheme
# DATABASE_URL is set from JAWSDB_URL in application.rb
production:
  adapter: mysql2
  url: <%= ENV["JAWSDB_URL"]&.sub("mysql://", "mysql2://") || ENV["DATABASE_URL"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  encoding: utf8mb4
